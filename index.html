<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <h2>Answer the questions to open the website 💖</h2>

        <form id="loginForm">

            <div class="input-group">
                <label for="username">
                    Fave coffee ni nekol? (ALL CAPS, NO SPACE)
                </label>
                <input
                    type="text"
                    id="username"
                    placeholder="Enter answer"
                    required
                >
            </div>

            <div class="input-group">
                <label for="password">
                    When did we first talk?
                </label>
                <input
                    type="text"
                    id="password"
                    placeholder="Enter answer"
                    required
                >
            </div>

            <button type="submit" class="btn">
                Enterrrr!
            </button>

            <div id="message" class="message"></div>

        </form>
    </div>

    <script src="script.js"></script>

</body>
</html>
